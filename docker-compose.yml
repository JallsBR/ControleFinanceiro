services:
  db:
    image: mysql:8.0
    restart: always
    env_file:
      - .env
    environment:
      # Apenas o que o script oficial do MySQL não lê do .env: evita sobrescrever
      # MYSQL_* do env_file com ${VAR:-default} do Compose (senão o root no contentor
      # pode ficar com "root_password" enquanto o web usa o .env real).
      MYSQL_ROOT_HOST: '%'
    # Host:contentor — no PC usa-se localhost:3307; entre serviços (web→db) usa-se porta 3306.
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build: .
    command:
      [
        "sh",
        "-c",
        "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000",
      ]
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
